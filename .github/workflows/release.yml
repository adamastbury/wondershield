name: Build Release Zip

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build plugin zip
        run: |
          mkdir wondershield
          cp -r wondershield.php includes templates wm-icon.svg wm-logo.svg wondershield/
          zip -r wondershield.zip wondershield/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: wondershield.zip
          generate_release_notes: true
